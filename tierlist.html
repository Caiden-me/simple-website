<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tier List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #222;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .tier-list {
            display: flex;
            gap: 0;
            border: 3px solid #444;
        }
        
        .tier-labels {
            display: flex;
            flex-direction: column;
            min-width: 150px;
            background: #1a1a1a;
            border-right: 3px solid #444;
        }
        
        .tier-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            border-bottom: 3px solid #444;
            padding: 10px;
            text-align: center;
        }
        
        .tier-label:last-child {
            border-bottom: none;
        }
        
        .tiers {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .tier {
            flex: 1;
            display: flex;
            border-bottom: 3px solid #444;
            padding: 10px;
            gap: 10px;
            overflow-x: auto;
            align-items: center;
            background: #2a2a2a;
        }
        
        .tier:last-child {
            border-bottom: none;
        }
        
        .tier img {
            height: 100%;
            max-height: 120px;
            object-fit: contain;
            border: 2px solid #555;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .tier img:hover {
            border-color: #fff;
            transform: scale(1.05);
            transition: all 0.2s;
        }
        
        /* Tier colors */
        .tier.s-plus-plus-inf {
            background: linear-gradient(135deg, #ff1744 0%, #ff6e40 100%);
        }
        
        .tier.s {
            background: linear-gradient(135deg, #ff1744 0%, #ff6e40 100%);
        }
        
        .tier.a {
            background: linear-gradient(135deg, #ff6e40 0%, #ffb300 100%);
        }
        
        .tier.b {
            background: linear-gradient(135deg, #ffb300 0%, #ffd600 100%);
        }
        
        .tier.c {
            background: linear-gradient(135deg, #ffd600 0%, #76ff03 100%);
        }
        
        .tier.d {
            background: linear-gradient(135deg, #76ff03 0%, #00e676 100%);
        }
        
        .tier.f {
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Image Tier List</h1>
        
        <div class="tier-list">
            <div class="tier-labels">
                <div class="tier-label" style="background: linear-gradient(135deg, #ff1744 0%, #ff6e40 100%);">S++inf</div>
                <div class="tier-label" style="background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);">F</div>
            </div>
            
            <div class="tiers">
                <!-- S++inf Tier -->
                <div class="tier s-plus-plus-inf">
                    <img src="Images/Skibidi toilet.webp" alt="Skibidi toilet">
                </div>
                
                <!-- F Tier -->
                <div class="tier f">
                    <img src="Images/2026-06-11 10_11_41-My Website — Mozilla Firefox.png" alt="2026-06-11 10_11_41-My Website — Mozilla Firefox">
                    <img src="Images/2026-06-11 10_12_23-My Website — Mozilla Firefox.png" alt="2026-06-11 10_12_23-My Website — Mozilla Firefox">
                    <img src="Images/2026-06-11 10_12_34-My Website — Mozilla Firefox.png" alt="2026-06-11 10_12_34-My Website — Mozilla Firefox">
                    <img src="Images/2026-06-11 10_12_46-My Website — Mozilla Firefox.png" alt="2026-06-11 10_12_46-My Website — Mozilla Firefox">
                    <img src="Images/2026-06-11 10_13_05-My Website — Mozilla Firefox.png" alt="2026-06-11 10_13_05-My Website — Mozilla Firefox">
                    <img src="Images/2026-06-11 10_15_24-My Website — Mozilla Firefox.png" alt="2026-06-11 10_15_24-My Website — Mozilla Firefox">
                    <img src="Images/2026-06-11 10_15_44-My Website — Mozilla Firefox.png" alt="2026-06-11 10_15_44-My Website — Mozilla Firefox">
                    <img src="Images/2026-06-11 10_16_04-My Website — Mozilla Firefox.png" alt="2026-06-11 10_16_04-My Website — Mozilla Firefox">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
